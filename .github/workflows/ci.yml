name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Unit tests
        run: bun test

      - name: Production build
        env:
          # Build imports DB modules during page-data collection; no live connection needed.
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
        run: bun run build
